<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }
    .container { max-width:600px; margin:auto; background:white; padding:20px; border-radius:10px; }
    input, button { padding:10px; margin:5px 0; width:100%; }
    .expense { display:flex; justify-content:space-between; background:#eee; padding:10px; margin-top:5px; }
  </style>
</head>
<body><div class="container">
  <h2>Expense Tracker</h2>  <input type="number" id="amount" placeholder="Amount">
  <input type="text" id="category" placeholder="Category">
  <input type="text" id="note" placeholder="Note">
  <button onclick="addExpense()">Add Expense</button>  <h3>Total: ₹<span id="total">0</span></h3>  <div id="list"></div>
</div><script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

function save(){ localStorage.setItem("expenses", JSON.stringify(expenses)); }

function addExpense(){
  const amount = document.getElementById("amount").value;
  const category = document.getElementById("category").value;
  const note = document.getElementById("note").value;

  if(!amount || !category){ alert("Enter amount & category"); return; }

  const date = new Date().toLocaleString(); // ✅ NEW FEATURE: DATE

  expenses.push({ amount:Number(amount), category, note, date });
  save();
  render();
}

function render(){
  const list = document.getElementById("list");
  const totalEl = document.getElementById("total");

  list.innerHTML = "";
  let total = 0;

  expenses.forEach((exp, i)=>{
    total += exp.amount;

    const div = document.createElement("div");
    div.className = "expense";
    div.innerHTML = `
      ₹${exp.amount} | ${exp.category} | ${exp.note} <br>
      <small>${exp.date}</small>
      <button onclick="deleteExpense(${i})">X</button>
    `;
    list.appendChild(div);
  });

  totalEl.innerText = total;
}

function deleteExpense(i){
  expenses.splice(i,1);
  save();
  render();
}

render();
</script></body>
</html>
